<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undergraduate Student Survey</title>
  <script src="https://unpkg.com/survey-core@1.12.20/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui@1.12.20/survey-js-ui.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/survey-core@1.12.20/defaultV2.min.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
    }

    .page {
      max-width: 980px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px;
    }

    .survey-header {
      margin-bottom: 18px;
    }

    .helper {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f0f4ff;
      line-height: 1.5;
    }

    .graph-wrap {
      width: 100%;
      max-width: 700px;
    }

    canvas.graph-canvas {
      width: 100%;
      max-width: 700px;
      border: 1px solid #94a3b8;
      border-radius: 8px;
      background: #ffffff;
      touch-action: none;
      display: block;
    }

    .graph-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .graph-actions button {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
      background: #fff;
      cursor: pointer;
    }

    .graph-help {
      font-size: 0.92rem;
      color: #334155;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <div class="survey-header">
        <h1>Undergraduate Student Survey</h1>
        <p>This version uses your uploaded graph images directly and overlays clickable points on them.</p>
      </div>
      <div id="surveyContainer"></div>
    </div>
  </div>

    (function registerGraphConnectQuestion() {
      const ComponentCollection = Survey.ComponentCollection.Instance;
      ComponentCollection.add({
        name: "graphconnect",
        title: "Graph Connect",
        questionJSON: { type: "empty" },
        onInit() {
          Survey.Serializer.addProperty("graphconnect", { name: "dots:itemvalues" });
          Survey.Serializer.addProperty("graphconnect", { name: "width:number", default: 500 });
          Survey.Serializer.addProperty("graphconnect", { name: "height:number", default: 500 });
          Survey.Serializer.addProperty("graphconnect", { name: "backgroundImage", default: "" });
          Survey.Serializer.addProperty("graphconnect", { name: "dotRadius:number", default: 8 });
        }
      });

      Survey.CustomWidgetCollection.Instance.addCustomWidget({
        name: "graphconnect-widget",
        title: "Graph Connect",
        iconName: "icon-rating",
        isFit: function (question) { return question.getType() === "graphconnect"; },
        isDefaultRender: false,
        htmlTemplate: "<div class='graph-wrap'><canvas class='graph-canvas'></canvas><div class='graph-actions'><button type='button' class='reset-btn'>Reset</button><span class='status'></span></div><div class='graph-help'>Click the dots in order. Each click adds the next point to one continuous line.</div></div>",
        activatedByChanged: function () { Survey.JsonObject.metaData.addClass("graphconnect", [], null, "empty"); },
        afterRender: function (question, el) {
          const canvas = el.querySelector(".graph-canvas");
          const resetBtn = el.querySelector(".reset-btn");
          const statusEl = el.querySelector(".status");

          function getVal(name, fallback) {
            const raw = question[name] ?? question.jsonObj?.[name] ?? (question.getPropertyValue ? question.getPropertyValue(name) : undefined);
            return raw === undefined || raw === null ? fallback : raw;
          }
          function getNum(name, fallback) {
            const n = Number(getVal(name, fallback));
            return Number.isFinite(n) ? n : fallback;
          }
          function normalizeDots(source) {
            if (!source) return [];
            let items = source;
            if (!Array.isArray(items)) {
              if (Array.isArray(items.items)) items = items.items;
              else if (Array.isArray(items.visibleChoices)) items = items.visibleChoices;
              else if (typeof items === "object") items = Object.values(items);
              else return [];
            }
            return items.map((d, idx) => {
              const candidate = d && typeof d === "object" ? (d.value && typeof d.value === "object" ? d.value : d) : {};
              const x = Number(candidate.x ?? d?.x ?? d?.locValue?.x);
              const y = Number(candidate.y ?? d?.y ?? d?.locValue?.y);
              const label = String(candidate.label ?? d?.label ?? d?.text ?? (idx + 1));
              return { x, y, label };
            }).filter(d => Number.isFinite(d.x) && Number.isFinite(d.y));
          }

          const logicalWidth = getNum("width", 500);
          const logicalHeight = getNum("height", 500);
          const dotRadius = getNum("dotRadius", 8);
          const backgroundImage = String(getVal("backgroundImage", ""));
          const finalDots = normalizeDots(question.dots).concat(normalizeDots(question.jsonObj?.dots));
          let selected = Array.isArray(question.value)
            ? question.value.map(p => Array.isArray(p) ? { x: Number(p[0]), y: Number(p[1]) } : p).filter(p => Number.isFinite(p.x) && Number.isFinite(p.y))
            : [];

          const dpr = window.devicePixelRatio || 1;
          canvas.width = logicalWidth * dpr;
          canvas.height = logicalHeight * dpr;
          canvas.style.width = logicalWidth + "px";
          canvas.style.height = logicalHeight + "px";
          const ctx = canvas.getContext("2d");
          ctx.scale(dpr, dpr);

          const bg = new Image();
          bg.src = backgroundImage;

          function drawBackground() {
            if (bg.complete && bg.naturalWidth) {
              ctx.drawImage(bg, 0, 0, logicalWidth, logicalHeight);
            } else {
              ctx.fillStyle = "#fff";
              ctx.fillRect(0, 0, logicalWidth, logicalHeight);
            }
          }

          function drawDots() {
            finalDots.forEach((dot, index) => {
              const px = dot.x;
              const py = dot.y;
              ctx.beginPath();
              ctx.fillStyle = index < selected.length ? "rgba(37,99,235,0.95)" : "rgba(239,68,68,0.95)";
              ctx.strokeStyle = "#111827";
              ctx.lineWidth = 2;
              ctx.arc(px, py, dotRadius, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 11px Arial";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(dot.label, px, py);
            });
            ctx.textAlign = "start";
            ctx.textBaseline = "alphabetic";
          }

          function drawLine() {
            if (!selected.length) return;
            ctx.beginPath();
            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 3;
            selected.forEach((p, idx) => {
              if (idx === 0) ctx.moveTo(p.x, p.y);
              else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
          }

          function render() {
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);
            drawBackground();
            drawLine();
            drawDots();
            statusEl.textContent = finalDots.length ? (selected.length + " / " + finalDots.length + " points connected") : "No dots loaded";
          }

          function updateValue() {
            question.value = selected.map(p => [Math.round(p.x * 100) / 100, Math.round(p.y * 100) / 100]);
          }

          function getClickPoint(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = logicalWidth / rect.width;
            const scaleY = logicalHeight / rect.height;
            return {
              x: (evt.clientX - rect.left) * scaleX,
              y: (evt.clientY - rect.top) * scaleY
            };
          }

          canvas.addEventListener("click", function (evt) {
            const pt = getClickPoint(evt);
            const clickedDot = finalDots.find(dot => {
            const isNear = Math.hypot(pt.x - dot.x, pt.y - dot.y) <= dotRadius + 10;
            const alreadyUsed = selected.some(p => p.x === dot.x && p.y === dot.y);
            return isNear && !alreadyUsed;
            });
            
            if (clickedDot) {
              selected.push({ x: clickedDot.x, y: clickedDot.y });
              updateValue();
              render();
            }
          });

          resetBtn.addEventListener("click", function () {
            selected = [];
            question.value = [];
            render();
          });

          if (bg.complete) render();
          bg.onload = render;
          bg.onerror = render;
          render();
        },
        willUnmount: function () { }
      }, "customtype");
    })();

    const params = new URLSearchParams(window.location.search);
    const runtimeSubmitUrl = params.get("submitUrl");
    if (runtimeSubmitUrl) window.SUBMIT_URL = runtimeSubmitUrl;

    const survey = new Survey.Model(surveyJson);
    survey.onComplete.add(async function (sender) {
      const payload = {
        submittedAt: new Date().toISOString(),
        responses: sender.data
      };
      const activeSubmitUrl = window.SUBMIT_URL || SUBMIT_URL;
      if (!activeSubmitUrl || activeSubmitUrl.includes("PASTE_YOUR")) {
        alert("Survey completed locally. Add your Google Apps Script Web App URL in the HTML file to store responses.");
        console.log("Survey results:", payload);
        return;
      }
      try {
        // Google Apps Script Web Apps often accept the POST successfully but do not expose
        // a readable cross-origin response to the browser. Using no-cors avoids the false
        // "could not be submitted" warning after the row is actually recorded in the sheet.
        await fetch(activeSubmitUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error(err);
        alert("The survey may not have been submitted. Please refresh and try again, or contact the researcher.");
      }
    });
    survey.onCurrentPageChanged.add(function () {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    SurveyUI.renderSurvey(survey, document.getElementById("surveyContainer"));
  </script>
</body>

</html>
